{% extends 'news_app/base.html' %}
{% block content %}
<section class="card narrow">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <p>Don’t have an account? <a href="{% url 'news_app:register' %}">Register here</a>.</p>
</section>
{% endblock %}
